<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE接続テスト</title>
<style>
body { background:#111; color:#eee; font-family:sans-serif; padding:20px; font-size:18px; }
button { font-size:20px; padding:20px; width:100%; margin-bottom:16px; border-radius:10px; border:none; background:#ff6b4a; color:#111; font-weight:bold; }
#out { background:#000; color:#0f0; padding:12px; border-radius:8px; white-space:pre-wrap; word-break:break-all; font-family:monospace; font-size:14px; min-height:200px; }
</style>
</head>
<body>
<h1>BLE接続テスト</h1>
<button id="btn1">1. Bluetooth対応チェック</button>
<button id="btn2">2. デバイス選択を呼び出す</button>
<div id="out">ここに結果が表示されます</div>

<script>
const out = document.getElementById('out');
function p(msg) {
  out.textContent += msg + "\n";
}

document.getElementById('btn1').addEventListener('click', () => {
  out.textContent = "";
  p("navigator.bluetooth: " + (navigator.bluetooth ? "あり" : "なし"));
  if (navigator.bluetooth) {
    p("getAvailability呼び出し中...");
    navigator.bluetooth.getAvailability().then(a => {
      p("getAvailability結果: " + a);
    }).catch(e => {
      p("getAvailabilityエラー: " + e.name + " - " + e.message);
    });
  }
  p("location.protocol: " + location.protocol);
  p("location.href: " + location.href);
  p("isSecureContext: " + window.isSecureContext);
});

document.getElementById('btn2').addEventListener('click', () => {
  out.textContent = "";
  p("requestDevice呼び出し中...");
  navigator.bluetooth.requestDevice({
    acceptAllDevices: true
  }).then(device => {
    p("成功!");
    p("デバイス名: " + device.name);
    p("デバイスID: " + device.id);
  }).catch(e => {
    p("エラー発生");
    p("名前(name): " + e.name);
    p("メッセージ(message): " + e.message);
    p("文字列化: " + String(e));
    p("JSON化: " + JSON.stringify(e, Object.getOwnPropertyNames(e)));
  });
});
</script>
</body>
</html>
